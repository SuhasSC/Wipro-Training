<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Dashboard</title>

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h2 class="text-center mb-4">Employee Management Dashboard</h2>

  <!-- Add / Update Form -->

  <div class="card p-4 mb-4">
    <h5 id="formTitle">Add Employee</h5>

<input type="hidden" id="empId">

<input type="text" id="name" class="form-control mb-3" placeholder="Enter Name">
<input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

<button class="btn btn-primary" onclick="saveEmployee()">Submit</button>

  </div>

  <!-- Employee Table -->

  <div class="card p-3">
    <h5>Employee List</h5>

<table class="table table-bordered text-center mt-3">
  <thead class="table-dark">
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Company</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody id="employeeTable">
    <!-- Data will load here -->
  </tbody>
</table>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
