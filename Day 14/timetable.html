<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTable</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="#">Spring Flowers School</a>

    <div class="ml-auto">
        <a href="index.html" class="btn btn-light">Back</a>
    </div>
</nav>

<!-- TIMETABLE -->
<div class="container mt-4">

    <h2 class="text-center mb-4">My Time Table</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center">

            <thead class="thead-dark">
                <tr>
                    <th>Day</th>
                    <th>9-10</th>
                    <th>10-11</th>
                    <th>11-12</th>
                    <th>12-1</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Monday</td>
                    <td>Math</td>
                    <td>Science</td>
                    <td>English</td>
                    <td>Sports</td>
                </tr>

                <tr>
                    <td>Tuesday</td>
                    <td>Physics</td>
                    <td>Chemistry</td>
                    <td>Math</td>
                    <td>Library</td>
                </tr>

                <tr>
                    <td>Wednesday</td>
                    <td>Biology</td>
                    <td>Math</td>
                    <td>English</td>
                    <td>Computer</td>
                </tr>

                <tr>
                    <td>Thursday</td>
                    <td>Science</td>
                    <td>Math</td>
                    <td>English</td>
                    <td>Games</td>
                </tr>

                <tr>
                    <td>Friday</td>
                    <td>Computer</td>
                    <td>Math</td>
                    <td>Science</td>
                    <td>Activity</td>
                </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
